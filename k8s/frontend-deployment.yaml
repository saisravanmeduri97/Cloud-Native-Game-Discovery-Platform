apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-frontend
  namespace: game-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: game-frontend
  template:
    metadata:
      labels:
        app: game-frontend
    spec:
      containers:
        - name: frontend
          image: __DOCKERHUB_USERNAME__/game-frontend:__IMAGE_TAG__
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_INTERNAL_URL
              value: "http://game-backend-svc.game-platform.svc.cluster.local:8000"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
