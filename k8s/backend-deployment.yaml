apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-backend
  namespace: game-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: game-backend
  template:
    metadata:
      labels:
        app: game-backend
    spec:
      serviceAccountName: game-backend-ksa
      containers:
        - name: backend
          image: __DOCKERHUB_USERNAME__/game-backend:__IMAGE_TAG__
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: GDP_PROJECT_NAME
              value: cloud-native-game-discovery-platform
            - name: GDP_DB_HOST
              value: game-postgres-svc
            - name: GDP_DB_PORT
              value: "5432"
            - name: GDP_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: gdp-db-secret
                  key: POSTGRES_DB
            - name: GDP_DB_USER
              valueFrom:
                secretKeyRef:
                  name: gdp-db-secret
                  key: POSTGRES_USER
            - name: GDP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gdp-db-secret
                  key: POSTGRES_PASSWORD
            - name: GDP_GCP_PROJECT_ID
              value: "__GCP_PROJECT_ID__"
            - name: GDP_GCP_LOCATION
              value: "us-central1"
            - name: GDP_EMBEDDING_MODEL
              value: "gemini-embedding-001"
            - name: GDP_QUERY_CACHE_FILE
              value: "/tmp/query_cache.json"
            - name: GDP_LOG_LEVEL
              value: "INFO"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
